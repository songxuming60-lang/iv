<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>隐含波动率分析</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap');
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#e8eaf0;--muted:#7a8299;
  --accent:#4f9eff;--accent2:#3dd68c;--warn:#f5a623;--danger:#ff5c5c;
  --card:#181e2e;--mono:'IBM Plex Mono',monospace;--sans:'Noto Sans SC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}

header{border-bottom:.5px solid var(--border);padding:0 2rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:100}
.logo{font-family:var(--mono);font-size:14px;font-weight:500;letter-spacing:.04em}
.logo span{color:var(--accent)}
.hdr-r{display:flex;align-items:center;gap:10px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:13px;font-family:var(--sans);cursor:pointer;border:.5px solid var(--border2);background:var(--bg3);color:var(--text);transition:all .15s}
.btn:hover{background:#252d42;border-color:rgba(255,255,255,.2)}
.btn.ok{background:var(--accent2);border-color:var(--accent2);color:#0a1f14;font-weight:500}
.btn.ok:hover{background:#34c47e}
.btn.sm{padding:5px 10px;font-size:12px}

main{max-width:1200px;margin:0 auto;padding:1.5rem}



/* Navigation */
.nav-section{background:var(--bg2);border:.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.nav-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.nav-row+.nav-row{margin-top:10px;padding-top:10px;border-top:.5px solid var(--border)}
.nav-label{font-size:11px;color:var(--muted);letter-spacing:.05em;min-width:52px;flex-shrink:0}

.ex-tab{padding:5px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;font-family:var(--sans)}
.ex-tab.on{background:var(--accent);border-color:var(--accent);color:#fff}

.cat-tab{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;font-family:var(--sans)}
.cat-tab.on{color:#fff}

.prod-tab{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;font-family:var(--sans)}
.prod-tab.on{color:#fff}
.prod-tab .code{font-family:var(--mono);font-size:10px;opacity:.7}

/* Date range */
.date-range{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-range input[type=date]{background:var(--bg3);border:.5px solid var(--border2);color:var(--text);padding:5px 10px;border-radius:6px;font-size:12px;font-family:var(--mono);cursor:pointer;outline:none}
.date-range input[type=date]:focus{border-color:var(--accent)}
.date-range input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5)}
.preset-btns{display:flex;gap:4px}
.preset{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;font-family:var(--sans);white-space:nowrap}
.preset.on{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.preset:hover{background:var(--bg3);color:var(--text)}
.date-sep{font-size:12px;color:var(--muted)}

/* Controls */
.ctrl{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:1.25rem}
.tg{display:flex;border:.5px solid var(--border2);border-radius:6px;overflow:hidden}
.tb{padding:7px 15px;font-size:13px;font-family:var(--sans);background:transparent;border:none;cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap}
.tb.on{background:var(--bg3);color:var(--text);font-weight:500}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.chip{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;font-family:var(--sans)}
.info-bar{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;padding:9px 14px;background:rgba(79,158,255,.08);border:.5px solid rgba(79,158,255,.2);border-radius:8px;font-size:12px;color:var(--accent)}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
.mc{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:14px 16px}
.mc .lbl{font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.03em}
.mc .val{font-family:var(--mono);font-size:22px;font-weight:500;line-height:1}
.mc .sub{font-size:11px;color:var(--muted);margin-top:5px;font-family:var(--mono);word-break:break-all}
.pt{height:3px;background:var(--border2);border-radius:2px;margin-top:8px;overflow:hidden}
.pf{height:100%;border-radius:2px;transition:width .5s}

/* Percentile bar */
.pct-cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
.pct-card{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;flex-direction:column;gap:4px}
.pct-card .plbl{font-size:11px;color:var(--muted);letter-spacing:.03em}
.pct-card .pval{font-family:var(--mono);font-size:18px;font-weight:500}
.pct-card .psub{font-size:10px;color:var(--muted);font-family:var(--mono)}
.pct-divider{height:.5px;background:var(--border);margin-bottom:1.5rem}

/* Chart */
.chart-card{background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:1.25rem}
.chart-ttl{font-size:13px;color:var(--muted);margin-bottom:1rem;font-family:var(--mono)}
.chart-wrap{position:relative;width:100%;height:340px}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px}
.li{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.ld{width:10px;height:3px;border-radius:2px;flex-shrink:0}
.empty-s{display:flex;flex-direction:column;align-items:center;justify-content:center;height:340px;color:var(--muted);gap:10px}
.empty-s p{font-size:14px}.empty-s small{font-size:12px}

/* Loading / empty */
#loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;color:var(--muted);gap:12px;text-align:center}
#loading-state p{font-size:14px}#loading-state small{font-size:12px}
.spin{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}header{padding:0 1rem}main{padding:1rem}}
</style>
</head>
<body>
<header>
  <div class="logo">IV<span>.</span>Analyzer</div>
  <div class="hdr-r">
    <div id="auto-status" style="font-size:12px;color:var(--muted);display:none"></div>
    <label class="btn sm" title="手动上传补充数据">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M5 5l3-3 3 3M3 11v2h10v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      上传
      <input type="file" accept=".xlsx,.xls,.csv" id="fi" multiple style="display:none">
    </label>
  </div>
</header>

<main>
<!-- Loading state -->
  <div id="loading-state">
    <div class="spin"></div>
    <p>正在加载数据…</p>
    <small id="load-detail">连接 GitHub 数据源</small>
  </div>

  <!-- App -->
  <div id="app" style="display:none">

    <!-- Navigation -->
    <div class="nav-section">
      <div class="nav-row">
        <span class="nav-label">交易所</span>
        <div id="ex-tabs"></div>
      </div>
      <div class="nav-row">
        <span class="nav-label">品类</span>
        <div id="cat-tabs" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
      <div class="nav-row">
        <span class="nav-label">品种</span>
        <div id="prod-tabs" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
      <div class="nav-row">
        <span class="nav-label">时段</span>
        <div class="date-range">
          <div class="preset-btns">
            <button class="preset" data-p="1m">近1月</button>
            <button class="preset" data-p="3m">近3月</button>
            <button class="preset" data-p="6m">近6月</button>
            <button class="preset" data-p="1y">近1年</button>
            <button class="preset" data-p="3y">近3年</button>
            <button class="preset on" data-p="all">全部</button>
          </div>
          <span class="date-sep">自定义</span>
          <input type="date" id="date-from" title="开始日期">
          <span class="date-sep">至</span>
          <input type="date" id="date-to" title="结束日期">
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="ctrl">
      <div class="tg" id="vtg">
        <button class="tb on" data-v="dominant">主力合约</button>
        <button class="tb" data-v="all">全部合约</button>
      </div>
      <div class="tg" id="ttg">
        <button class="tb on" data-t="line">折线图</button>
        <button class="tb" data-t="bar">柱状图</button>
      </div>
      <div id="ds" style="font-size:12px;color:var(--muted);margin-left:auto"></div>
    </div>

    <div id="ib" class="info-bar">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 7v4M8 5v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      每日主力合约 = 当天<strong style="margin:0 3px">成交量最大</strong>的合约系列，鼠标悬停可查看具体合约名称
    </div>

    <div class="chips" id="ch" style="display:none"></div>

    <div class="metrics">
      <div class="mc"><div class="lbl">最新 IV</div><div class="val" id="m-cur"></div><div class="sub" id="m-cur-s"></div></div>
      <div class="mc"><div class="lbl">历史最高</div><div class="val" id="m-max"></div><div class="sub" id="m-max-s"></div></div>
      <div class="mc"><div class="lbl">历史最低</div><div class="val" id="m-min"></div><div class="sub" id="m-min-s"></div></div>
      <div class="mc">
        <div class="lbl">历史分位数</div>
        <div class="val" id="m-pct"></div>
        <div class="sub">当前IV在历史中的位置</div>
        <div class="pt"><div class="pf" id="pf" style="width:0%"></div></div>
      </div>
    </div>

    <div class="pct-cards" id="pct-cards">
      <div class="pct-card"><div class="plbl">P5 分位数</div><div class="pval" id="p5">—</div><div class="psub" id="p5s">历史最低5%水平</div></div>
      <div class="pct-card"><div class="plbl">P10 分位数</div><div class="pval" id="p10">—</div><div class="psub" id="p10s">历史较低10%水平</div></div>
      <div class="pct-card"><div class="plbl">P90 分位数</div><div class="pval" id="p90">—</div><div class="psub" id="p90s">历史较高90%水平</div></div>
      <div class="pct-card"><div class="plbl">P95 分位数</div><div class="pval" id="p95">—</div><div class="psub" id="p95s">历史最高95%水平</div></div>
    </div>

    <div class="chart-card">
      <div class="chart-ttl" id="cttl">隐含波动率</div>
      <div class="chart-wrap">
        <canvas id="cv" role="img" aria-label="隐含波动率历史走势"></canvas>
        <div class="empty-s" id="em" style="display:none">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          <p>暂无数据</p><small>请选择品种</small>
        </div>
      </div>
      <div class="legend" id="lg"></div>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const COLORS=['#4f9eff','#3dd68c','#f5a623','#ff5c5c','#c77dff','#ff9f43','#26d7e8','#fd79a8'];

// ── GitHub 配置 ────────────────────────────────────────────────────
const GITHUB_USER='songxuming60-lang';
const GITHUB_REPO='iv';
const GITHUB_BRANCH='main';

const DATA_FILES=[
  {name:'铜期权',     code:'CU', path:'data/copper_iv.csv',    exchange:'上期所', category:'金属'},
  {name:'铝期权',     code:'AL', path:'data/aluminum_iv.csv',  exchange:'上期所', category:'金属'},
  {name:'锌期权',     code:'ZN', path:'data/zinc_iv.csv',      exchange:'上期所', category:'金属'},
  {name:'铅期权',     code:'PB', path:'data/lead_iv.csv',      exchange:'上期所', category:'金属'},
  {name:'镍期权',     code:'NI', path:'data/nickel_iv.csv',    exchange:'上期所', category:'金属'},
  {name:'锡期权',     code:'SN', path:'data/tin_iv.csv',       exchange:'上期所', category:'金属'},
  {name:'黄金期权',   code:'AU', path:'data/gold_iv.csv',      exchange:'上期所', category:'金属'},
  {name:'白银期权',   code:'AG', path:'data/silver_iv.csv',    exchange:'上期所', category:'金属'},
  {name:'燃料油期权', code:'FU', path:'data/fuel_iv.csv',      exchange:'上期所', category:'能源化工'},
  {name:'天然橡胶期权',code:'RU', path:'data/rubber_iv.csv',   exchange:'上期所', category:'能源化工'},
  {name:'工业硅期权', code:'SI', path:'data/si_iv.csv',        exchange:'广期所', category:'新能源'},
  {name:'碳酸锂期权', code:'LC', path:'data/lc_iv.csv',        exchange:'广期所', category:'新能源'},
  {name:'多晶硅期权', code:'PS', path:'data/ps_iv.csv',        exchange:'广期所', category:'新能源'},
  {name:'铂期权',     code:'PT', path:'data/pt_iv.csv',        exchange:'广期所', category:'贵金属'},
  {name:'钯期权',     code:'PD', path:'data/pd_iv.csv',        exchange:'广期所', category:'贵金属'},
];

// 产品元数据查找表 (code → {name, exchange, category, color})
const PROD_META={};
const CAT_COLORS={'金属':'#4f9eff','能源化工':'#3dd68c','农产品':'#f5a623','新能源':'#c77dff','贵金属':'#f5a623'};
const EX_COLORS={'上期所':'#4f9eff','大商所':'#3dd68c','郑商所':'#f5a623','广期所':'#c77dff'};

DATA_FILES.forEach((f,i)=>{
  PROD_META[f.code]={name:f.name.replace('期权',''),exchange:f.exchange,category:f.category,color:COLORS[i%COLORS.length]};
});

// ── State ──────────────────────────────────────────────────────────
let allData=[],chart=null,chartType='line',viewMode='dominant',activeSeries=new Set();
let dateFrom='',dateTo='';
let curExchange='上期所',curCategory='金属',curProd='';

// ── Excel helpers ──────────────────────────────────────────────────
function xlDate(v){
  if(typeof v==='number'){const d=XLSX.SSF.parse_date_code(v);if(!d)return String(v);return `${d.y}/${String(d.m).padStart(2,'0')}/${String(d.d).padStart(2,'0')}`;}
  if(v instanceof Date)return `${v.getFullYear()}/${String(v.getMonth()+1).padStart(2,'0')}/${String(v.getDate()).padStart(2,'0')}`;
  return String(v).replace(/-/g,'/');
}
function sheetToRows(sheet){
  const raw=XLSX.utils.sheet_to_json(sheet,{header:1,defval:''});
  if(raw.length<2)return[];
  const hdr=raw[0].map(h=>String(h).trim());
  return raw.slice(1).map(row=>{const o={};hdr.forEach((h,i)=>o[h]=row[i]??'');return o;});
}
function parseCSV(txt){
  const lines=txt.trim().split(/\r?\n/);if(lines.length<2)return[];
  const hdr=lines[0].split(',').map(h=>h.trim());
  return lines.slice(1).map(l=>{const c=l.split(',').map(x=>x.trim());const o={};hdr.forEach((h,i)=>o[h]=c[i]||'');return o;});
}
function detectCols(rows){
  if(!rows.length)return null;
  const keys=Object.keys(rows[0]);
  const find=(...c)=>keys.find(k=>c.some(x=>String(k).includes(x)));
  return{date:find('交易日期','日期','date'),series:find('合约系列','合约','series'),iv:find('隐含波动率(%)','隐含波动率%','IV%')||find('隐含波动率','IV','iv'),vol:find('成交量','volume','Volume')};
}
function rowsToData(rows,exchange,category){
  const cols=detectCols(rows);
  if(!cols.date||!cols.series||!cols.iv)return null;
  return rows
    .filter(r=>{const s=String(r[cols.series]).trim();return s&&!s.includes('小计')&&!s.includes('合计');})
    .map(r=>{
      const iv=parseFloat(r[cols.iv]),vol=cols.vol?parseFloat(r[cols.vol]):NaN;
      const series=String(r[cols.series]).trim();
      return{date:xlDate(r[cols.date]),series,iv:isNaN(iv)?null:iv,vol:isNaN(vol)?0:vol,
             product:series.replace(/\d+/g,'').toUpperCase(),exchange,category};
    }).filter(r=>r.iv!==null&&r.date);
}

// ── Auto load from GitHub ──────────────────────────────────────────
async function autoLoadFromGitHub(){
  const status=document.getElementById('auto-status');
  const detail=document.getElementById('load-detail');
  status.style.display='block';status.textContent='加载中…';

  const results=await Promise.allSettled(
    DATA_FILES.map(async file=>{
      const url=`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${file.path}`;
      const res=await fetch(url);
      if(!res.ok)return null;
      let rows;
      if(file.path.endsWith('.csv')){
        rows=parseCSV(await res.text());
      }else{
        const buf=await res.arrayBuffer();
        const wb=XLSX.read(new Uint8Array(buf),{type:'array',cellDates:false});
        rows=sheetToRows(wb.Sheets[wb.SheetNames[0]]);
      }
      return{file,rows};
    })
  );

  let loaded=0;
  results.forEach(r=>{
    if(r.status==='fulfilled'&&r.value){
      const {file,rows}=r.value;
      const data=rowsToData(rows,file.exchange,file.category);
      if(data&&data.length){allData.push(...data);loaded++;}
    }
  });

  if(loaded>0){
    document.getElementById('loading-state').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('ds').textContent=allData.length.toLocaleString()+' 条记录';
    
    status.textContent=`已加载 ${loaded} 个品种`;
    setTimeout(()=>{status.style.display='none';},2000);
    initNav();
  }else{
    detail.textContent='数据加载失败，请手动上传文件';
    document.querySelector('.spin').style.display='none';
    status.style.display='none';
  }
}

// ── Manual file upload ─────────────────────────────────────────────
document.getElementById('fi').addEventListener('change',e=>{
  const files=Array.from(e.target.files);let pending=files.length,added=0;
  if(!pending)return;
  files.forEach(file=>{
    const reader=new FileReader();const isCSV=file.name.toLowerCase().endsWith('.csv');
    reader.onload=ev=>{
      let rows=[];
      if(isCSV){rows=parseCSV(ev.target.result);}
      else{let wb;try{wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array',cellDates:false});}catch(err){pending--;if(!pending&&added>0)finUpload();return;}rows=sheetToRows(wb.Sheets[wb.SheetNames[0]]);}
      const data=rowsToData(rows,'手动上传','其他');
      if(data&&data.length){allData.push(...data);added++;}
      pending--;if(!pending&&added>0)finUpload();
    };
    isCSV?reader.readAsText(file,'UTF-8'):reader.readAsArrayBuffer(file);
  });
  function finUpload(){
    document.getElementById('loading-state').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('ds').textContent=allData.length.toLocaleString()+' 条记录';
    initNav();
  }
  e.target.value='';
});

// ── Navigation ─────────────────────────────────────────────────────
function getExchanges(){return[...new Set(allData.map(r=>r.exchange))];}
function getCategories(ex){return[...new Set(allData.filter(r=>r.exchange===ex).map(r=>r.category))];}
function getProds(ex,cat){return[...new Set(allData.filter(r=>r.exchange===ex&&r.category===cat).map(r=>r.product))];}

function initNav(){
  const exs=getExchanges();
  if(!exs.includes(curExchange))curExchange=exs[0];
  renderExTabs();
}

function renderExTabs(){
  const exs=getExchanges();
  const el=document.getElementById('ex-tabs');
  el.innerHTML='';el.style.display='flex';el.style.gap='6px';
  exs.forEach(ex=>{
    const btn=document.createElement('button');
    btn.className='ex-tab'+(ex===curExchange?' on':'');
    btn.textContent=ex;
    const c=EX_COLORS[ex]||'#4f9eff';
    if(ex===curExchange)btn.style.cssText=`background:${c};border-color:${c};color:#fff`;
    btn.addEventListener('click',()=>{curExchange=ex;renderExTabs();});
    el.appendChild(btn);
  });
  const cats=getCategories(curExchange);
  if(!cats.includes(curCategory))curCategory=cats[0];
  renderCatTabs();
}

function renderCatTabs(){
  const cats=getCategories(curExchange);
  const el=document.getElementById('cat-tabs');
  el.innerHTML='';
  cats.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='cat-tab'+(cat===curCategory?' on':'');
    const c=CAT_COLORS[cat]||'#4f9eff';
    if(cat===curCategory)btn.style.cssText=`background:${c}22;border-color:${c}55;color:${c}`;
    btn.textContent=cat;
    btn.addEventListener('click',()=>{curCategory=cat;renderCatTabs();});
    el.appendChild(btn);
  });
  const prods=getProds(curExchange,curCategory);
  if(!prods.includes(curProd))curProd=prods[0]||'';
  renderProdTabs();
}

function renderProdTabs(){
  const prods=getProds(curExchange,curCategory);
  const el=document.getElementById('prod-tabs');
  el.innerHTML='';
  prods.forEach(code=>{
    const meta=PROD_META[code]||{name:code,color:'#888'};
    const btn=document.createElement('button');
    btn.className='prod-tab'+(code===curProd?' on':'');
    if(code===curProd)btn.style.cssText=`background:${meta.color}22;border-color:${meta.color}55;color:${meta.color}`;
    btn.innerHTML=`${meta.name||code} <span class="code">${code}</span>`;
    btn.addEventListener('click',()=>{curProd=code;activeSeries.clear();renderProdTabs();renderChips();renderAll();});
    el.appendChild(btn);
  });
  activeSeries.clear();renderChips();renderAll();
}

// ── Chips ──────────────────────────────────────────────────────────
function renderChips(){
  const ch=document.getElementById('ch'),ib=document.getElementById('ib');
  if(viewMode==='dominant'){ch.style.display='none';ib.style.display='flex';return;}
  ib.style.display='none';ch.style.display='flex';
  const series=[...new Set(allData.filter(r=>r.product===curProd).map(r=>r.series))].sort();
  if(activeSeries.size===0)series.forEach(s=>activeSeries.add(s));
  ch.innerHTML=series.map((s,i)=>{const c=COLORS[i%COLORS.length],on=activeSeries.has(s);return `<button class="chip${on?' on':''}" data-s="${s}" style="${on?`border-color:${c};color:${c};background:${c}18`:''}">${s}</button>`;}).join('');
  ch.querySelectorAll('.chip').forEach(btn=>btn.addEventListener('click',()=>{const s=btn.dataset.s;activeSeries.has(s)?activeSeries.delete(s):activeSeries.add(s);renderChips();renderAll();}));
}

// ── Data helpers ───────────────────────────────────────────────────
function inDateRange(date){
  if(dateFrom && date < dateFrom.replace(/-/g,'/')) return false;
  if(dateTo && date > dateTo.replace(/-/g,'/')) return false;
  return true;
}
function getContractExpiry(series){
  // 从合约系列名中提取到期年月，如 si2409 → 2024-09
  const m=series.match(/([a-zA-Z]+)(\d{4})$/);
  if(!m)return null;
  const ym=m[2];
  const year=2000+parseInt(ym.slice(0,2));
  const month=parseInt(ym.slice(2,4));
  return new Date(year,month-1,1); // 近似到期日（月初）
}
function getDominant(){
  const byDate={};
  const curExchangeForProd=(()=>{
    const f=DATA_FILES.find(f=>f.code===curProd);
    return f?f.exchange:'';
  })();

  allData.filter(r=>r.product===curProd&&inDateRange(r.date)).forEach(r=>{
    if(curExchangeForProd==='广期所'){
      // 广期所：取离当天最近到期、且到期日距当天超过5天的合约
      if(!byDate[r.date]){
        byDate[r.date]=r;
      } else {
        const tradeDay=new Date(r.date);
        const fiveDaysLater=new Date(tradeDay);
        fiveDaysLater.setDate(fiveDaysLater.getDate()+5);
        const expA=getContractExpiry(byDate[r.date].series);
        const expB=getContractExpiry(r.series);
        if(!expA){byDate[r.date]=r;return;}
        if(!expB)return;
        // 过滤掉到期日不足5天的合约
        const aValid=expA>=fiveDaysLater;
        const bValid=expB>=fiveDaysLater;
        if(!aValid&&bValid){byDate[r.date]=r;return;}
        if(aValid&&!bValid)return;
        // 都有效时取到期日最近的
        if(expB<expA)byDate[r.date]=r;
      }
    } else {
      // 上期所：按成交量
      if(!byDate[r.date]||r.vol>byDate[r.date].vol)byDate[r.date]=r;
    }
  });
  return Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
}
function getFiltered(){return allData.filter(r=>r.product===curProd&&inDateRange(r.date)&&(activeSeries.size===0||activeSeries.has(r.series)));}
function getData(){return viewMode==='dominant'?getDominant():getFiltered();}

// ── Metrics ────────────────────────────────────────────────────────
function renderMetrics(){
  const data=getData();if(!data.length)return;
  const sorted=[...data].sort((a,b)=>a.date.localeCompare(b.date));
  const latest=sorted[sorted.length-1];
  const maxR=data.reduce((a,b)=>a.iv>b.iv?a:b);
  const minR=data.reduce((a,b)=>a.iv<b.iv?a:b);
  const pct=data.filter(r=>r.iv<=latest.iv).length/data.length*100;
  document.getElementById('m-cur').textContent=latest.iv.toFixed(2)+'%';
  document.getElementById('m-cur-s').textContent=latest.date+'  '+latest.series;
  document.getElementById('m-max').textContent=maxR.iv.toFixed(2)+'%';
  document.getElementById('m-max-s').textContent=maxR.date+'  '+maxR.series;
  document.getElementById('m-min').textContent=minR.iv.toFixed(2)+'%';
  document.getElementById('m-min-s').textContent=minR.date+'  '+minR.series;
  document.getElementById('m-pct').textContent=pct.toFixed(1)+'%';
  const pf=document.getElementById('pf');
  pf.style.width=pct.toFixed(1)+'%';
  pf.style.background=pct>=80?'#ff5c5c':pct>=50?'#f5a623':'#3dd68c';

  // Percentile values
  const ivSorted=[...data.map(r=>r.iv)].sort((a,b)=>a-b);
  const quantile=(arr,q)=>{
    const pos=(arr.length-1)*q;
    const lo=Math.floor(pos),hi=Math.ceil(pos);
    return lo===hi?arr[lo]:arr[lo]+(arr[hi]-arr[lo])*(pos-lo);
  };
  const p5=quantile(ivSorted,.05),p10=quantile(ivSorted,.10),p90=quantile(ivSorted,.90),p95=quantile(ivSorted,.95);
  const cur=latest.iv;
  const pctColor=(v)=>cur>v?'#ff5c5c':'#3dd68c';
  const aboveBelow=(v)=>cur>v?`当前高于此水平`:`当前低于此水平`;

  document.getElementById('p5').textContent=p5.toFixed(2)+'%';
  document.getElementById('p5').style.color=pctColor(p5);
  document.getElementById('p5s').textContent=aboveBelow(p5);
  document.getElementById('p10').textContent=p10.toFixed(2)+'%';
  document.getElementById('p10').style.color=pctColor(p10);
  document.getElementById('p10s').textContent=aboveBelow(p10);
  document.getElementById('p90').textContent=p90.toFixed(2)+'%';
  document.getElementById('p90').style.color=pctColor(p90);
  document.getElementById('p90s').textContent=aboveBelow(p90);
  document.getElementById('p95').textContent=p95.toFixed(2)+'%';
  document.getElementById('p95').style.color=pctColor(p95);
  document.getElementById('p95s').textContent=aboveBelow(p95);
}

// ── Chart ──────────────────────────────────────────────────────────
function renderChart(){
  const data=getData();
  document.getElementById('em').style.display=data.length?'none':'flex';
  document.getElementById('cv').style.display=data.length?'block':'none';
  document.getElementById('lg').innerHTML='';
  if(!data.length){if(chart){chart.destroy();chart=null;}return;}
  if(chart){chart.destroy();chart=null;}
  const ctx=document.getElementById('cv').getContext('2d');
  const meta=PROD_META[curProd]||{color:'#4f9eff',name:curProd};
  const scl={
    x:{ticks:{maxTicksLimit:10,maxRotation:45,color:'#7a8299',font:{size:11,family:'IBM Plex Mono'}},grid:{color:'rgba(255,255,255,.04)'},border:{color:'rgba(255,255,255,.07)'}},
    y:{ticks:{callback:v=>v.toFixed(1)+'%',color:'#7a8299',font:{size:11,family:'IBM Plex Mono'}},grid:{color:'rgba(255,255,255,.04)'},border:{color:'rgba(255,255,255,.07)'}}
  };
  const ttp={backgroundColor:'#1e2535',borderColor:'rgba(255,255,255,.1)',borderWidth:.5,titleFont:{family:'IBM Plex Mono',size:11},bodyFont:{family:'IBM Plex Mono',size:11}};

  if(viewMode==='dominant'){
    const dates=data.map(r=>r.date),ivs=data.map(r=>r.iv);
    const smap={};data.forEach(r=>smap[r.date]=r.series);
    document.getElementById('cttl').textContent=`${meta.name}（${curProd}）主力合约隐含波动率`;
    document.getElementById('lg').innerHTML=`<span class="li"><span class="ld" style="background:${meta.color}"></span>主力合约 IV（按成交量）</span>`;
    chart=new Chart(ctx,{
      type:chartType==='bar'?'bar':'line',
      data:{labels:dates,datasets:[{label:'主力IV',data:ivs,borderColor:meta.color,backgroundColor:chartType==='bar'?meta.color+'99':meta.color+'18',borderWidth:chartType==='line'?2:0,pointRadius:chartType==='line'?(dates.length>80?0:3):0,pointHoverRadius:5,fill:chartType==='line',tension:0.3,spanGaps:true}]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{...ttp,callbacks:{title:items=>`${items[0].label}  [${smap[items[0].label]||''}]`,label:c=>` IV: ${c.parsed.y!==null?c.parsed.y.toFixed(2)+'%':'—'}`}}},scales:scl}
    });
  }else{
    const seriesList=[...new Set(data.map(r=>r.series))].sort();
    const dates=[...new Set(data.map(r=>r.date))].sort((a,b)=>a.localeCompare(b));
    document.getElementById('cttl').textContent=`${meta.name}（${curProd}）隐含波动率`;
    const lg=document.getElementById('lg');
    const datasets=seriesList.map((s,i)=>{
      const c=COLORS[i%COLORS.length];
      lg.innerHTML+=`<span class="li"><span class="ld" style="background:${c}"></span>${s}</span>`;
      return{label:s,data:dates.map(d=>{const r=data.find(x=>x.date===d&&x.series===s);return r?r.iv:null;}),borderColor:c,backgroundColor:chartType==='bar'?c+'99':c+'18',spanGaps:true,borderWidth:chartType==='line'?2:0,pointRadius:chartType==='line'?(dates.length>80?0:3):0,pointHoverRadius:5,fill:false,tension:0.3};
    });
    chart=new Chart(ctx,{type:chartType==='bar'?'bar':'line',data:{labels:dates,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{...ttp,callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y!==null?c.parsed.y.toFixed(2)+'%':'—'}`}}},scales:scl}});
  }
}
function renderAll(){renderMetrics();renderChart();}

// ── Date range controls ───────────────────────────────────────────
function applyPreset(p){
  const now = new Date();
  const fmt = d => d.toISOString().slice(0,10);
  const sub = (d,months) => { const r=new Date(d); r.setMonth(r.getMonth()-months); return r; };
  const subY = (d,years) => { const r=new Date(d); r.setFullYear(r.getFullYear()-years); return r; };
  if(p==='all'){dateFrom='';dateTo='';}
  else if(p==='1m'){dateFrom=fmt(sub(now,1));dateTo='';}
  else if(p==='3m'){dateFrom=fmt(sub(now,3));dateTo='';}
  else if(p==='6m'){dateFrom=fmt(sub(now,6));dateTo='';}
  else if(p==='1y'){dateFrom=fmt(subY(now,1));dateTo='';}
  else if(p==='3y'){dateFrom=fmt(subY(now,3));dateTo='';}
  document.getElementById('date-from').value=dateFrom;
  document.getElementById('date-to').value=dateTo;
}

document.querySelectorAll('.preset').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.preset').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    applyPreset(btn.dataset.p);
    renderAll();
  });
});
document.getElementById('date-from').addEventListener('change',e=>{
  dateFrom=e.target.value;
  document.querySelectorAll('.preset').forEach(b=>b.classList.remove('on'));
  renderAll();
});
document.getElementById('date-to').addEventListener('change',e=>{
  dateTo=e.target.value;
  document.querySelectorAll('.preset').forEach(b=>b.classList.remove('on'));
  renderAll();
});
