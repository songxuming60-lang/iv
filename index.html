<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>隐含波动率分析</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap');
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#e8eaf0;--muted:#7a8299;
  --accent:#4f9eff;--accent2:#3dd68c;--warn:#f5a623;--danger:#ff5c5c;
  --card:#181e2e;--mono:'IBM Plex Mono',monospace;--sans:'Noto Sans SC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}

header{border-bottom:.5px solid var(--border);padding:0 2rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:100}
.logo{font-family:var(--mono);font-size:14px;font-weight:500;letter-spacing:.04em}
.logo span{color:var(--accent)}
.hdr-r{display:flex;align-items:center;gap:10px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:13px;font-family:var(--sans);cursor:pointer;border:.5px solid var(--border2);background:var(--bg3);color:var(--text);transition:all .15s}
.btn:hover{background:#252d42;border-color:rgba(255,255,255,.2)}
.btn.ok{background:var(--accent2);border-color:var(--accent2);color:#0a1f14;font-weight:500}
.btn.ok:hover{background:#34c47e}
.btn.danger{background:transparent;border-color:var(--danger);color:var(--danger)}
.btn.danger:hover{background:rgba(255,92,92,.08)}

main{max-width:1100px;margin:0 auto;padding:1.5rem}

/* Drop zone */
.dropzone{border:1px dashed var(--border2);border-radius:12px;padding:2.5rem 2rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2);margin-bottom:1.25rem}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);background:rgba(79,158,255,.05)}
.dropzone .ico{font-size:32px;margin-bottom:12px;opacity:.6}
.dropzone h3{font-size:15px;font-weight:500;margin-bottom:5px}
.dropzone p{font-size:13px;color:var(--muted)}
.dropzone .tip{margin-top:8px;font-size:12px;color:var(--accent)}

/* File list */
.file-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1.25rem}
.file-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border:.5px solid var(--border2);border-radius:8px}
.file-icon{width:28px;height:28px;border-radius:6px;background:rgba(79,158,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-name{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-meta{font-size:11px;color:var(--muted);white-space:nowrap}
.file-prods{display:flex;gap:4px;flex-wrap:wrap}
.prod-badge{font-size:11px;padding:2px 7px;border-radius:10px;border:.5px solid;font-family:var(--mono)}
.file-del{background:transparent;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:4px;display:flex;align-items:center;transition:color .15s}
.file-del:hover{color:var(--danger)}

/* Share bar */
.share-bar{display:flex;align-items:center;gap:10px;background:var(--bg2);border:.5px solid var(--border2);border-radius:8px;padding:10px 14px;margin-bottom:1.25rem}
.share-lbl{font-size:12px;color:var(--muted);white-space:nowrap}
.share-url{flex:1;font-family:var(--mono);font-size:12px;color:var(--accent);background:transparent;border:none;outline:none;min-width:0;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.copied{font-size:12px;color:var(--accent2);white-space:nowrap;opacity:0;transition:opacity .3s}
.copied.show{opacity:1}

/* Controls */
.ctrl{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:1.25rem}
select{background:var(--bg3);border:.5px solid var(--border2);color:var(--text);padding:7px 12px;border-radius:6px;font-size:13px;font-family:var(--sans);cursor:pointer}
select:focus{outline:none;border-color:var(--accent)}

/* Product tabs */
.prod-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.prod-tab{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;font-family:var(--sans)}
.prod-tab.on{color:#fff}

.tg{display:flex;border:.5px solid var(--border2);border-radius:6px;overflow:hidden}
.tb{padding:7px 15px;font-size:13px;font-family:var(--sans);background:transparent;border:none;cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap}
.tb.on{background:var(--bg3);color:var(--text);font-weight:500}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.chip{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--muted);transition:all .15s;font-family:var(--sans)}

.info-bar{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;padding:9px 14px;background:rgba(79,158,255,.08);border:.5px solid rgba(79,158,255,.2);border-radius:8px;font-size:12px;color:var(--accent)}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
.mc{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:14px 16px}
.mc .lbl{font-size:11px;color:var(--muted);margin-bottom:6px;letter-spacing:.03em}
.mc .val{font-family:var(--mono);font-size:22px;font-weight:500;line-height:1}
.mc .sub{font-size:11px;color:var(--muted);margin-top:5px;font-family:var(--mono);word-break:break-all}
.pt{height:3px;background:var(--border2);border-radius:2px;margin-top:8px;overflow:hidden}
.pf{height:100%;border-radius:2px;transition:width .5s}

/* Chart */
.chart-card{background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:1.25rem}
.chart-ttl{font-size:13px;color:var(--muted);margin-bottom:1rem;font-family:var(--mono)}
.chart-wrap{position:relative;width:100%;height:340px}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px}
.li{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.ld{width:10px;height:3px;border-radius:2px;flex-shrink:0}

.empty-s{display:flex;flex-direction:column;align-items:center;justify-content:center;height:340px;color:var(--muted);gap:10px}
.empty-s p{font-size:14px}.empty-s small{font-size:12px}

/* Empty state (no files) */
#no-data{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;color:var(--muted);gap:10px;text-align:center}
#no-data p{font-size:14px}#no-data small{font-size:12px}

@media(max-width:640px){
  .metrics{grid-template-columns:repeat(2,minmax(0,1fr))}
  header{padding:0 1rem}main{padding:1rem}
}
</style>
</head>
<body>

<header>
  <div class="logo">IV<span>.</span>Analyzer</div>
  <div class="hdr-r">
    <div id="ds" style="font-size:12px;color:var(--muted)"></div>
    <div id="auto-status" style="font-size:12px;color:var(--accent);display:none"></div>
    <label class="btn">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M5 5l3-3 3 3M3 11v2h10v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      添加文件
      <input type="file" accept=".xlsx,.xls,.csv" id="fi" multiple style="display:none">
    </label>
  </div>
</header>

<main>
  <!-- Share bar -->
  <div id="sb" class="share-bar" style="display:none">
    <span class="share-lbl">分享链接</span>
    <input class="share-url" id="su" readonly placeholder="点击左侧按钮生成…">
    <button class="btn ok" id="gen-btn" onclick="generateShareLink()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M5 5l3-3 3 3M3 11v2h10v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      生成分享链接
    </button>
    <button class="btn" id="copy-btn" onclick="copyLink()" style="display:none">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M11 5V3.5A1.5 1.5 0 009.5 2h-6A1.5 1.5 0 002 3.5v6A1.5 1.5 0 003.5 11H5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      复制
    </button>
    <span class="copied" id="ct">已复制 ✓</span>
  </div>

  <!-- Drop zone (always visible) -->
  <div id="dz" class="dropzone" onclick="document.getElementById('fi').click()">
    <div class="ico">📂</div>
    <h3>拖拽或点击上传数据文件</h3>
    <p>支持同时上传多个 .xlsx / .xls / .csv 文件</p>
    <p class="tip">部署到 Netlify 后，每次打开页面自动加载最新数据</p>
  </div>

  <!-- Uploaded file list -->
  <div class="file-list" id="fl"></div>

  <!-- No data placeholder -->
  <div id="no-data">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity=".25"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    <p>尚未上传任何文件</p>
    <small>上传后图表将显示在这里</small>
  </div>

  <!-- App (shown once data loaded) -->
  <div id="app" style="display:none">

    <!-- Product tabs -->
    <div class="prod-tabs" id="ptabs"></div>

    <!-- Controls row -->
    <div class="ctrl">
      <div class="tg" id="vtg">
        <button class="tb on" data-v="dominant">主力合约</button>
        <button class="tb" data-v="all">全部合约</button>
      </div>
      <div class="tg" id="ttg">
        <button class="tb on" data-t="line">折线图</button>
        <button class="tb" data-t="bar">柱状图</button>
      </div>
    </div>

    <div id="ib" class="info-bar">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 7v4M8 5v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      每日主力合约 = 当天<strong style="margin:0 3px">成交量最大</strong>的合约系列，鼠标悬停可查看具体合约名称
    </div>

    <div class="chips" id="ch" style="display:none"></div>

    <div class="metrics">
      <div class="mc"><div class="lbl">最新 IV</div><div class="val" id="m-cur"></div><div class="sub" id="m-cur-s"></div></div>
      <div class="mc"><div class="lbl">历史最高</div><div class="val" id="m-max"></div><div class="sub" id="m-max-s"></div></div>
      <div class="mc"><div class="lbl">历史最低</div><div class="val" id="m-min"></div><div class="sub" id="m-min-s"></div></div>
      <div class="mc">
        <div class="lbl">历史分位数</div>
        <div class="val" id="m-pct"></div>
        <div class="sub">当前IV在历史中的位置</div>
        <div class="pt"><div class="pf" id="pf" style="width:0%"></div></div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-ttl" id="cttl">隐含波动率</div>
      <div class="chart-wrap">
        <canvas id="cv" role="img" aria-label="隐含波动率历史走势"></canvas>
        <div class="empty-s" id="em" style="display:none">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          <p>暂无数据</p><small>请选择品种</small>
        </div>
      </div>
      <div class="legend" id="lg"></div>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<script>
const COLORS = ['#4f9eff','#3dd68c','#f5a623','#ff5c5c','#c77dff','#ff9f43','#26d7e8','#fd79a8'];
// Tab colors mapped by index
const TAB_COLORS = ['#4f9eff','#3dd68c','#f5a623','#ff5c5c','#c77dff','#ff9f43','#26d7e8','#fd79a8'];

// State
let fileStore = [];       // [{id, name, rows, products:[]}]
let allData = [];         // merged across all files
let chart = null;
let chartType = 'line';
let viewMode = 'dominant';
let activeSeries = new Set();
let curProd = '';

// ── Share via /api/store (Netlify Blobs, same-origin, no CORS) ────
function enc(d){try{return LZString.compressToBase64(JSON.stringify(d));}catch(e){return null;}}
function dec(s){try{return JSON.parse(LZString.decompressFromBase64(s));}catch(e){return null;}}

async function generateShareLink(){
  if(!allData.length)return;
  const btn=document.getElementById('gen-btn');
  const input=document.getElementById('su');
  btn.disabled=true; btn.textContent='上传中…';
  try{
    const payload={data:allData,files:fileStore.map(f=>({id:f.id,name:f.name,products:f.products}))};
    const compressed=enc(payload);
    if(!compressed)throw new Error('数据压缩失败');

    const res=await fetch('/api/store',{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:compressed
    });
    if(!res.ok)throw new Error('服务器错误 HTTP '+res.status);
    const {id}=await res.json();
    if(!id)throw new Error('未返回ID');

    const url=location.origin+location.pathname+'#s='+id;
    input.value=url;
    history.replaceState(null,'','#s='+id);
    document.getElementById('copy-btn').style.display='inline-flex';
    btn.innerHTML='<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 8l3 3 7-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>已生成';
    btn.disabled=false;
  }catch(e){
    btn.disabled=false;
    btn.innerHTML='<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M5 5l3-3 3 3M3 11v2h10v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>生成分享链接';
    alert('链接生成失败：'+e.message+'\n\n提示：请确认已通过 Netlify 部署（非本地打开），且 /api/store 函数已部署成功。');
  }
}
function copyLink(){
  const input=document.getElementById('su');
  const showTip=()=>{const t=document.getElementById('ct');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);};
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(input.value).then(showTip).catch(()=>fallbackCopy(input,showTip));
  }else{
    fallbackCopy(input,showTip);
  }
}
function fallbackCopy(input,cb){
  input.select();input.setSelectionRange(0,99999);
  try{document.execCommand('copy');cb();}catch(e){alert('请手动复制以下链接：\n'+input.value);}
  window.getSelection&&window.getSelection().removeAllRanges();
}

// ── Excel date ─────────────────────────────────────────────────────
function xlDate(v){
  if(typeof v==='number'){const d=XLSX.SSF.parse_date_code(v);if(!d)return String(v);return `${d.y}/${String(d.m).padStart(2,'0')}/${String(d.d).padStart(2,'0')}`;}
  if(v instanceof Date)return `${v.getFullYear()}/${String(v.getMonth()+1).padStart(2,'0')}/${String(v.getDate()).padStart(2,'0')}`;
  return String(v).replace(/-/g,'/');
}

// ── Parse helpers ──────────────────────────────────────────────────
function sheetToRows(sheet){
  const raw=XLSX.utils.sheet_to_json(sheet,{header:1,defval:''});
  if(raw.length<2)return[];
  const hdr=raw[0].map(h=>String(h).trim());
  return raw.slice(1).map(row=>{const o={};hdr.forEach((h,i)=>o[h]=row[i]??'');return o;});
}
function parseCSV(txt){
  const lines=txt.trim().split(/\r?\n/);if(lines.length<2)return[];
  const hdr=lines[0].split(',').map(h=>h.trim());
  return lines.slice(1).map(l=>{const c=l.split(',').map(x=>x.trim());const o={};hdr.forEach((h,i)=>o[h]=c[i]||'');return o;});
}
function detectCols(rows){
  if(!rows.length)return null;
  const keys=Object.keys(rows[0]);
  const find=(...c)=>keys.find(k=>c.some(x=>String(k).includes(x)));
  return{
    date:  find('交易日期','日期','date','Date'),
    series:find('合约系列','合约','series','contract'),
    iv:    find('隐含波动率(%)','隐含波动率%','IV%')||find('隐含波动率','IV','iv'),
    vol:   find('成交量','volume','Volume'),
  };
}

function rowsToData(rows, fileId){
  const cols=detectCols(rows);
  if(!cols.date||!cols.series||!cols.iv)return null;
  return rows
    .filter(r=>{const s=String(r[cols.series]).trim();return s&&!s.includes('小计')&&!s.includes('合计');})
    .map(r=>{
      const iv=parseFloat(r[cols.iv]),vol=cols.vol?parseFloat(r[cols.vol]):NaN;
      const series=String(r[cols.series]).trim();
      return{date:xlDate(r[cols.date]),series,iv:isNaN(iv)?null:iv,vol:isNaN(vol)?0:vol,product:series.replace(/\d+/g,'').toUpperCase(),fileId};
    }).filter(r=>r.iv!==null&&r.date);
}

// ── Rebuild merged allData ─────────────────────────────────────────
function rebuildData(){
  allData=fileStore.flatMap(f=>f.data);
}

// ── File list UI ───────────────────────────────────────────────────
const prodColors={};
let prodColorIdx=0;
function prodColor(p){
  if(!prodColors[p]){prodColors[p]=TAB_COLORS[prodColorIdx%TAB_COLORS.length];prodColorIdx++;}
  return prodColors[p];
}

function renderFileList(){
  const fl=document.getElementById('fl');
  fl.innerHTML=fileStore.map(f=>`
    <div class="file-item" id="fi-${f.id}">
      <div class="file-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M9 2H4a1 1 0 00-1 1v10a1 1 0 001 1h8a1 1 0 001-1V6L9 2z" stroke="#4f9eff" stroke-width="1.3" stroke-linejoin="round"/><path d="M9 2v4h4" stroke="#4f9eff" stroke-width="1.3" stroke-linejoin="round"/></svg>
      </div>
      <div class="file-name" title="${f.name}">${f.name}</div>
      <div class="file-prods">${f.products.map(p=>`<span class="prod-badge" style="border-color:${prodColor(p)}44;color:${prodColor(p)};background:${prodColor(p)}14">${p}</span>`).join('')}</div>
      <div class="file-meta">${f.data.length} 条</div>
      <button class="file-del" onclick="removeFile('${f.id}')" title="移除此文件">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  `).join('');
}

function removeFile(id){
  fileStore=fileStore.filter(f=>f.id!==id);
  rebuildData();
  renderFileList();
  refreshApp();
}

// ── Process a single file ──────────────────────────────────────────
let fileIdCounter=0;
function addFileData(name, rows){
  const data=rowsToData(rows, String(fileIdCounter));
  if(!data||!data.length){alert(`文件「${name}」解析后无有效数据，已跳过`);return false;}
  const products=[...new Set(data.map(r=>r.product))];
  fileStore.push({id:String(fileIdCounter++),name,data,products});
  return true;
}

function processFileList(fileList){
  const files=Array.from(fileList);
  let pending=files.length;
  let added=0;
  if(!pending)return;

  files.forEach(file=>{
    const reader=new FileReader();
    const isCSV=file.name.toLowerCase().endsWith('.csv');
    reader.onload=ev=>{
      let rows=[];
      if(isCSV){
        rows=parseCSV(ev.target.result);
      }else{
        let wb;
        try{wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array',cellDates:false});}
        catch(err){alert('文件读取失败：'+file.name+'\n'+err.message);pending--;if(!pending)finalise();return;}
        // Use first sheet
        rows=sheetToRows(wb.Sheets[wb.SheetNames[0]]);
      }
      if(addFileData(file.name, rows))added++;
      pending--;
      if(!pending)finalise();
    };
    isCSV?reader.readAsText(file,'UTF-8'):reader.readAsArrayBuffer(file);
  });

  function finalise(){
    if(!added)return;
    rebuildData();
    renderFileList();
    refreshApp();
    document.getElementById('sb').style.display='flex';
  }
}

// ── App refresh ────────────────────────────────────────────────────
function refreshApp(){
  const prods=[...new Set(allData.map(r=>r.product))].sort();
  document.getElementById('no-data').style.display=prods.length?'none':'flex';
  document.getElementById('app').style.display=prods.length?'block':'none';
  document.getElementById('ds').textContent=allData.length?allData.length+' 条记录':'';

  if(!prods.length){if(chart){chart.destroy();chart=null;}return;}

  // Keep current product if still valid
  if(!prods.includes(curProd))curProd=prods[0];

  renderProdTabs(prods);
  activeSeries.clear();
  renderChips();
  renderAll();
}

// ── Product tabs ───────────────────────────────────────────────────
function renderProdTabs(prods){
  const el=document.getElementById('ptabs');
  el.innerHTML=prods.map(p=>{
    const c=prodColor(p),on=p===curProd;
    return `<button class="prod-tab${on?' on':''}" data-p="${p}" style="${on?`background:${c}20;border-color:${c}55;color:${c}`:''}">
      ${p}
    </button>`;
  }).join('');
  el.querySelectorAll('.prod-tab').forEach(btn=>btn.addEventListener('click',()=>{
    curProd=btn.dataset.p;activeSeries.clear();renderProdTabs(prods);renderChips();renderAll();
  }));
}

// ── Chips (all mode) ───────────────────────────────────────────────
function renderChips(){
  const ch=document.getElementById('ch'),ib=document.getElementById('ib');
  if(viewMode==='dominant'){ch.style.display='none';ib.style.display='flex';return;}
  ib.style.display='none';ch.style.display='flex';
  const series=[...new Set(allData.filter(r=>r.product===curProd).map(r=>r.series))].sort();
  if(activeSeries.size===0)series.forEach(s=>activeSeries.add(s));
  ch.innerHTML=series.map((s,i)=>{
    const c=COLORS[i%COLORS.length],on=activeSeries.has(s);
    return `<button class="chip${on?' on':''}" data-s="${s}" style="${on?`border-color:${c};color:${c};background:${c}18`:''}">${s}</button>`;
  }).join('');
  ch.querySelectorAll('.chip').forEach(btn=>btn.addEventListener('click',()=>{
    const s=btn.dataset.s;activeSeries.has(s)?activeSeries.delete(s):activeSeries.add(s);
    renderChips();renderAll();
  }));
}

// ── Data helpers ───────────────────────────────────────────────────
function getDominant(){
  const byDate={};
  allData.filter(r=>r.product===curProd).forEach(r=>{
    if(!byDate[r.date]||r.vol>byDate[r.date].vol)byDate[r.date]=r;
  });
  return Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
}
function getFiltered(){return allData.filter(r=>r.product===curProd&&(activeSeries.size===0||activeSeries.has(r.series)));}
function getData(){return viewMode==='dominant'?getDominant():getFiltered();}

// ── Metrics ────────────────────────────────────────────────────────
function renderMetrics(){
  const data=getData();if(!data.length)return;
  const sorted=[...data].sort((a,b)=>a.date.localeCompare(b.date));
  const latest=sorted[sorted.length-1];
  const maxR=data.reduce((a,b)=>a.iv>b.iv?a:b);
  const minR=data.reduce((a,b)=>a.iv<b.iv?a:b);
  const pct=data.filter(r=>r.iv<=latest.iv).length/data.length*100;
  document.getElementById('m-cur').textContent=latest.iv.toFixed(2)+'%';
  document.getElementById('m-cur-s').textContent=latest.date+'  '+latest.series;
  document.getElementById('m-max').textContent=maxR.iv.toFixed(2)+'%';
  document.getElementById('m-max-s').textContent=maxR.date+'  '+maxR.series;
  document.getElementById('m-min').textContent=minR.iv.toFixed(2)+'%';
  document.getElementById('m-min-s').textContent=minR.date+'  '+minR.series;
  document.getElementById('m-pct').textContent=pct.toFixed(1)+'%';
  const pf=document.getElementById('pf');
  pf.style.width=pct.toFixed(1)+'%';
  pf.style.background=pct>=80?'#ff5c5c':pct>=50?'#f5a623':'#3dd68c';
}

// ── Chart ──────────────────────────────────────────────────────────
function renderChart(){
  const data=getData();
  document.getElementById('em').style.display=data.length?'none':'flex';
  document.getElementById('cv').style.display=data.length?'block':'none';
  document.getElementById('lg').innerHTML='';
  if(!data.length){if(chart){chart.destroy();chart=null;}return;}
  if(chart){chart.destroy();chart=null;}
  const ctx=document.getElementById('cv').getContext('2d');
  const scl={
    x:{ticks:{maxTicksLimit:10,maxRotation:45,color:'#7a8299',font:{size:11,family:'IBM Plex Mono'}},grid:{color:'rgba(255,255,255,.04)'},border:{color:'rgba(255,255,255,.07)'}},
    y:{ticks:{callback:v=>v.toFixed(1)+'%',color:'#7a8299',font:{size:11,family:'IBM Plex Mono'}},grid:{color:'rgba(255,255,255,.04)'},border:{color:'rgba(255,255,255,.07)'}}
  };
  const ttp={backgroundColor:'#1e2535',borderColor:'rgba(255,255,255,.1)',borderWidth:.5,titleFont:{family:'IBM Plex Mono',size:11},bodyFont:{family:'IBM Plex Mono',size:11}};
  const pc=prodColor(curProd);

  if(viewMode==='dominant'){
    const dates=data.map(r=>r.date),ivs=data.map(r=>r.iv);
    const smap={};data.forEach(r=>smap[r.date]=r.series);
    document.getElementById('cttl').textContent=curProd+'  主力合约隐含波动率（日度）';
    document.getElementById('lg').innerHTML=`<span class="li"><span class="ld" style="background:${pc}"></span>主力合约 IV（按成交量选取）</span>`;
    chart=new Chart(ctx,{
      type:chartType==='bar'?'bar':'line',
      data:{labels:dates,datasets:[{
        label:'主力合约 IV',data:ivs,
        borderColor:pc,backgroundColor:chartType==='bar'?pc+'99':pc+'18',
        borderWidth:chartType==='line'?2:0,
        pointRadius:chartType==='line'?(dates.length>80?0:3):0,
        pointHoverRadius:5,fill:chartType==='line',tension:0.3,spanGaps:true,
      }]},
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},tooltip:{...ttp,callbacks:{
          title:items=>`${items[0].label}  [${smap[items[0].label]||''}]`,
          label:c=>` IV: ${c.parsed.y!==null?c.parsed.y.toFixed(2)+'%':'—'}`
        }}},
        scales:scl
      }
    });
  }else{
    const seriesList=[...new Set(data.map(r=>r.series))].sort();
    const dates=[...new Set(data.map(r=>r.date))].sort((a,b)=>a.localeCompare(b));
    document.getElementById('cttl').textContent=curProd+'  隐含波动率 期限结构';
    const lg=document.getElementById('lg');
    const datasets=seriesList.map((s,i)=>{
      const c=COLORS[i%COLORS.length];
      lg.innerHTML+=`<span class="li"><span class="ld" style="background:${c}"></span>${s}</span>`;
      return{label:s,data:dates.map(d=>{const r=data.find(x=>x.date===d&&x.series===s);return r?r.iv:null;}),
        borderColor:c,backgroundColor:chartType==='bar'?c+'99':c+'18',
        spanGaps:true,borderWidth:chartType==='line'?2:0,
        pointRadius:chartType==='line'?(dates.length>80?0:3):0,
        pointHoverRadius:5,fill:chartType==='line'&&seriesList.length===1,tension:0.3};
    });
    chart=new Chart(ctx,{type:chartType==='bar'?'bar':'line',data:{labels:dates,datasets},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},tooltip:{...ttp,callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y!==null?c.parsed.y.toFixed(2)+'%':'—'}`}}},
        scales:scl}});
  }
}
function renderAll(){renderMetrics();renderChart();}

// ── Controls ───────────────────────────────────────────────────────
document.getElementById('vtg').querySelectorAll('.tb').forEach(btn=>btn.addEventListener('click',()=>{
  document.getElementById('vtg').querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');viewMode=btn.dataset.v;activeSeries.clear();renderChips();renderAll();
}));
document.getElementById('ttg').querySelectorAll('.tb').forEach(btn=>btn.addEventListener('click',()=>{
  document.getElementById('ttg').querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));

}));

const GITHUB_USER = 'songxuming60-lang';
const GITHUB_REPO = 'iv';
const GITHUB_BRANCH = 'main';

const DATA_FILES = [
  { name: '铜期权',    path: 'data/copper_iv.xlsx' },
  { name: '天然橡胶期权', path: 'data/rubber_iv.xlsx' },
  { name: '黄金期权',   path: 'data/gold_iv.xlsx' },
  { name: '铝期权',    path: 'data/aluminum_iv.xlsx' },
  { name: '锌期权',    path: 'data/zinc_iv.xlsx' },
  { name: '白银期权',   path: 'data/silver_iv.xlsx' },
  { name: '铅期权',    path: 'data/lead_iv.xlsx' },
  { name: '镍期权',    path: 'data/nickel_iv.xlsx' },
  { name: '锡期权',    path: 'data/tin_iv.xlsx' },
  { name: '燃料油期权',  path: 'data/fuel_iv.xlsx' },
];

async function autoLoadFromGitHub() {
  // Skip if data already loaded (e.g. from URL hash restore)
  if (allData.length > 0) return;

  const status = document.getElementById('auto-status');
  status.style.display = 'block';
  status.textContent = '正在加载数据…';

  let loaded = 0;
  for (const file of DATA_FILES) {
    try {
      const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${file.path}`;
      const res = await fetch(url);
      if (!res.ok) continue;
      const buf = await res.arrayBuffer();
      const wb = XLSX.read(new Uint8Array(buf), { type: 'array', cellDates: false });
      const rows = sheetToRows(wb.Sheets[wb.SheetNames[0]]);
      if (addFileData(file.name, rows)) loaded++;
      status.textContent = `正在加载数据… ${loaded}/${DATA_FILES.length}`;
    } catch(e) {
      console.warn('自动加载失败:', file.name, e);
    }
  }

  if (loaded > 0) {
    rebuildData();
    renderFileList();
    refreshApp();
    status.textContent = `已自动加载 ${loaded} 个品种`;
    setTimeout(() => { status.style.display = 'none'; }, 3000);
  } else {
    status.textContent = '自动加载失败，请手动上传';
    status.style.color = 'var(--warn)';
  }
}

// ── Restore from URL hash (#s=id → fetch /api/store) ─────────────
window.addEventListener('load',async()=>{
  const hash=location.hash;
  if(!hash.startsWith('#s='))return;
  const id=hash.slice(3);
  if(!id)return;

  document.getElementById('no-data').innerHTML=`
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity=".3"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    <p>正在加载共享数据…</p><small>ID: ${id}</small>`;

  try{
    const res=await fetch('/api/store?id='+id);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const compressed=await res.text();
    const decoded=dec(compressed);
    if(!decoded)throw new Error('数据解压失败');

    let data,meta;
    if(Array.isArray(decoded)){data=decoded;meta=[];}
    else if(decoded.data){data=decoded.data;meta=decoded.files||[];}
    else throw new Error('数据格式不正确');

    if(meta.length){
      const byFile={};
      data.forEach(r=>{const fid=r.fileId||'0';if(!byFile[fid])byFile[fid]=[];byFile[fid].push(r);});
      fileStore=meta.map(f=>({...f,data:byFile[f.id]||[]}));
    }else{
      fileStore=[{id:'0',name:'共享数据',data,products:[...new Set(data.map(r=>r.product))]}];
    }

    rebuildData();
    renderFileList();
    refreshApp();
    document.getElementById('su').value=location.href;
    document.getElementById('sb').style.display='flex';
    document.getElementById('copy-btn').style.display='inline-flex';
    document.getElementById('gen-btn').innerHTML='<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 8l3 3 7-7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>已生成';

  }catch(e){
    document.getElementById('no-data').innerHTML=`
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#ff5c5c" stroke-width="1"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 15.5v.5"/></svg>
      <p style="color:#ff5c5c">加载失败</p><small>${e.message}</small>`;
  }

  // Auto-load from GitHub if no hash data
  autoLoadFromGitHub();
});
</script>
